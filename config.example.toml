input_dir = "/music/input"
output_dir = "/music/output"
output_mode = "copy"
automation_mode = "safe"
confidence_threshold = 90
cover_art_enabled = true
overwrite_existing_tags = true
acoustid_api_key = ""
musicbrainz_user_agent = "Ununknown/0.1 (you@example.com)"
# Environment alternatives: UNUNKNOWN_ACOUSTID_API_KEY and UNUNKNOWN_MUSICBRAINZ_USER_AGENT

[path_templates]
default_template = "$albumartist/$album/$track - $title"
compilation_template = "Compilations/$album/$track - $artist - $title"
unknown_artist = "Unknown Artist"
unknown_album = "Unknown Album"
unknown_title = "Unknown Title"
track_padding = 2
disc_padding = 2
max_filename_length = 255
collision_strategy = "skip"

[in_place]
write_tags = true
embed_cover_art = true
rename_files = false
rename_folders = false
filename_template = "$track - $title"
preserve_mtime = false

[metadata_fields]
title = true
artist = true
album = true
album_artist = true
track_number = true
track_total = true
disc_number = true
disc_total = true
release_date = true
genre = true
composer = false
label = false
comment = false
isrc = true
musicbrainz_recording_id = true
musicbrainz_release_id = true
musicbrainz_artist_id = true
musicbrainz_album_artist_id = true
embed_cover_art = true
replace_existing_cover_art = false
