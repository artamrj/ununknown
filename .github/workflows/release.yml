name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version to create, for example v0.6.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  image:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          # A manual release may create a tag that does not exist yet. Build the
          # exact commit selected in the workflow UI instead of checking out the
          # requested version as a ref.
          ref: ${{ github.sha }}

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH, for example v0.6.0"
            exit 1
          fi
          {
            echo "value=${RELEASE_TAG#v}"
            echo "sha=$(git rev-parse HEAD)"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push native image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}-${{ matrix.suffix }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            VCS_REF=${{ steps.version.outputs.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=release-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=release-${{ matrix.suffix }}
          provenance: mode=max
          sbom: true

      - name: Scan published architecture
        uses: aquasecurity/trivy-action@v0.36.0
        env:
          TRIVY_PLATFORM: ${{ matrix.platform }}
        with:
          version: v0.72.0
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.value }}-${{ matrix.suffix }}
          format: table
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore.yaml

  publish:
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.sha }}

      - name: Resolve version
        id: version
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use vMAJOR.MINOR.PATCH, for example v0.6.0"
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          {
            echo "tag=$RELEASE_TAG"
            echo "value=$version"
            echo "minor=${version%.*}"
            echo "major=${version%%.*}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish multi-architecture version tags
        env:
          VERSION: ${{ steps.version.outputs.value }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          MINOR: ${{ steps.version.outputs.minor }}
          MAJOR: ${{ steps.version.outputs.major }}
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE_NAME:$VERSION" \
            --tag "$IMAGE_NAME:$RELEASE_TAG" \
            --tag "$IMAGE_NAME:$MINOR" \
            --tag "$IMAGE_NAME:$MAJOR" \
            --tag "$IMAGE_NAME:latest" \
            "$IMAGE_NAME:$VERSION-amd64" \
            "$IMAGE_NAME:$VERSION-arm64"
          docker buildx imagetools inspect "$IMAGE_NAME:$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" \
              --target "$RELEASE_SHA" \
              --generate-notes \
              --title "$RELEASE_TAG"
