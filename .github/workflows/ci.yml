name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: rustfmt, clippy }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - name: Check project versions
        run: |
          CARGO_VERSION="$(cargo metadata --no-deps --format-version 1 | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).packages.find(pkg => pkg.name === 'ununknown').version));")"
          FRONTEND_VERSION="$(node -p "require('./frontend/package.json').version")"
          if [ "$CARGO_VERSION" != "$FRONTEND_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION frontend/package.json=$FRONTEND_VERSION"
            exit 1
          fi
          echo "Project version: $CARGO_VERSION"
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: docker build -t ununknown:test .
  publish:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with: { node-version: 24 }
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Read project version
        id: version
        run: |
          VERSION="$(cargo metadata --no-deps --format-version 1 | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => console.log(JSON.parse(input).packages.find(pkg => pkg.name === 'ununknown').version));")"
          FRONTEND_VERSION="$(node -p "require('./frontend/package.json').version")"
          if [ "$VERSION" != "$FRONTEND_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$VERSION frontend/package.json=$FRONTEND_VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tags=ghcr.io/${GITHUB_REPOSITORY}:latest,ghcr.io/${GITHUB_REPOSITORY}:$VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Ununknown
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
