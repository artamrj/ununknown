services:
  ununknown:
    image: ghcr.io/artamrj/ununknown:latest
    restart: unless-stopped
    ports:
      - "7331:7331"
    environment:
      UNUNKNOWN_DB: /cache/ununknown.sqlite
      UNUNKNOWN_INPUT_DIR: /music/input
      UNUNKNOWN_OUTPUT_DIR: /music/output
      UNUNKNOWN_ACOUSTID_API_KEY: ${UNUNKNOWN_ACOUSTID_API_KEY:-}
      UNUNKNOWN_MUSICBRAINZ_USER_AGENT: ${UNUNKNOWN_MUSICBRAINZ_USER_AGENT:-Ununknown/0.4.5 (https://github.com/artamrj/ununknown)}
    volumes:
      - ${UNUNKNOWN_CACHE_DIR:-./data/cache}:/cache
      - ${UNUNKNOWN_INPUT_DIR_HOST:-./data/input}:/music/input
      - ${UNUNKNOWN_OUTPUT_DIR_HOST:-./data/output}:/music/output
