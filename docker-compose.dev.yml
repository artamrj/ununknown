services:
  ununknown:
    build: .
    ports:
      - "7331:7331"
    environment:
      RUST_LOG: info
      UNUNKNOWN_ACOUSTID_API_KEY: ${UNUNKNOWN_ACOUSTID_API_KEY:-}
      UNUNKNOWN_MUSICBRAINZ_USER_AGENT: ${UNUNKNOWN_MUSICBRAINZ_USER_AGENT:-Ununknown/0.2.0 (https://github.com/artamrj/ununknown)}
    volumes:
      - ./music/input:/music/input
      - ./music/output:/music/output
      - ./cache:/cache
    restart: unless-stopped
